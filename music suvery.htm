<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Survey Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f6ff;
        margin: 40px;
    }

    h1 {
        text-align: center;
        color: #2a3d8f;
    }

    form {
        width: 60%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }

    fieldset {
        margin-bottom: 20px;
        border: 2px solid #2a3d8f;
        padding: 15px;
        border-radius: 6px;
    }

    legend {
        font-weight: bold;
        color: #2a3d8f;
    }

    label {
        display: block;
        margin: 8px 0;
    }

    textarea {
        width: 100%;
        resize: none;
    }

    select {
        width: 100%;
        padding: 5px;
    }

    .buttons {
        text-align: center;
        margin-top: 20px;
    }

    .buttons input {
        padding: 10px 20px;
        margin: 5px;
        font-size: 1em;
        cursor: pointer;
    }

    footer {
        margin-top: 40px;
        text-align: center;
        font-size: 0.9em;
        color: #333;
    }

    footer a {
        color: #2a3d8f;
        text-decoration: none;
    }
</style>
</head>

<body>

<h1>Music Survey</h1>

<form action="https://formspree.io/f/mlgpqqnr" method="POST">

    <!-- Name -->
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" size="40">

    <!-- Email -->
    <label for="email">E-Mail:</label>
    <input type="email" id="email" name="email" size="40">



    <!-- Checkboxes -->
    <fieldset>
        <legend>Your Favorite Types of Music</legend>

        <label><input type="checkbox" name="genre" value="pop"> Pop</label>
        <label><input type="checkbox" name="genre" value="classical"> Classical</label>
        <label><input type="checkbox" name="genre" value="rock"> Rock</label>
        <label><input type="checkbox" name="genre" value="folk"> Folk</label>
        <label><input type="checkbox" name="genre" value="rap"> Rap</label>
        <label><input type="checkbox" name="genre" value="other"> Other</label>
    </fieldset>

     <fieldset>
    <legend>Select how often you purchase Music:</legend>

    <label><input type="radio" name="purchase" value="weekly"> Weekly</label>
    <label><input type="radio" name="purchase" value="few"> A few CDs each year</label>
    <label><input type="radio" name="purchase" value="monthly"> Monthly</label>
    <label><input type="radio" name="purchase" value="never"> Never purchase</label>
</fieldset>


    <!-- Select Box -->
    <label for="location">Select the locations you listen to Music:</label>
    <select id="location" name="location" size="3">
        <option value="home">At Home</option>
        <option value="car">In the Car</option>
        <option value="gym">At the Gym</option>
        <option value="anywhere">Anywhere</option>
    </select>
    <!-- Scrolling Text Box -->
    <label for="comments">What role does music play in your life?</label>
    <textarea id="comments" name="comments" cols="60" rows="3"></textarea>
    <!-- Buttons -->
    <div class="buttons">
        <input type="submit" value="Submit Survey">
        <input type="reset" value="Reset Form">
    </div>

</form>

<footer>
    <p>Created by: <strong>Cameron</strong></p>
    <p>Email: <strong>cameronbillingsley44@gmail.com</strong></p>
    <p><a href="index.htm">Return to Assignment Gallery</a></p>
</footer>

</body>
</html>
